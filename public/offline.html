<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - Kalender Liturgi Katolik</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: 'Inter', sans-serif;
      background-color: #FDFAF5;
      color: #1C2B3A;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      text-align: center;
    }
    .card {
      background: #FFFFFF;
      border: 1px solid #E8E2D6;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(28, 43, 58, 0.08);
      padding: 40px 32px;
      max-width: 480px;
      width: 100%;
      border-top: 6px solid #7B2D8B;
    }
    .icon-container {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
      background-color: #F5EEF8;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .icon {
      width: 40px;
      height: 40px;
      stroke: #7B2D8B;
      stroke-width: 2;
      fill: none;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 26px;
      font-weight: 900;
      margin-bottom: 12px;
      color: #4A235A;
    }
    p {
      font-size: 15px;
      line-height: 1.6;
      color: #55585D;
      margin-bottom: 30px;
    }
    .btn {
      display: inline-block;
      background-color: #7B2D8B;
      color: #FFFFFF;
      text-decoration: none;
      padding: 12px 24px;
      border-radius: 30px;
      font-size: 14px;
      font-weight: 600;
      transition: background-color 0.2s, transform 0.2s;
      border: none;
      cursor: pointer;
    }
    .btn:hover {
      background-color: #4A235A;
      transform: translateY(-1px);
    }
    .footer {
      margin-top: 40px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #A8833A;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-container">
      <svg class="icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M1 1l22 22M16.72 11.06A10.94 10.94 0 0 1 19 12.5M5 12.5a10.94 10.94 0 0 1 5.83-2.84M8.53 16.03a6 6 0 0 1 1.68-.83M13.79 15.2a6 6 0 0 1 1.68.83M10.88 19.12a1.5 1.5 0 1 1 2.24 0" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <h1>Koneksi Terputus</h1>
    <p>Anda sedang offline saat ini. Jangan khawatir, Anda masih dapat mengakses data liturgi dan kutipan Katolik yang sebelumnya telah dimuat oleh aplikasi.</p>
    <button class="btn" onclick="window.location.reload()">Coba Lagi</button>
    <div class="footer">Kalender Liturgi Katolik</div>
  </div>
</body>
</html>
